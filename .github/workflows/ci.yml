name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Python 后端测试
  test-backend:
    name: Test Python Backend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio

    - name: Run tests
      run: |
        cd src/backend
        pytest ../tests/unit/ -v

  # 代码风格检查
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install linters
      run: |
        pip install flake8 black

    - name: Run flake8
      run: |
        flake8 src/backend --max-line-length=120 --ignore=E501,W503

    - name: Run black check
      run: |
        black --check src/backend

  # 文档构建
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install documentation tools
      run: |
        pip install sphinx sphinx-rtd-theme

    - name: Build documentation
      run: |
        cd docs
        # TODO: 配置并运行 Sphinx 构建
        echo "Documentation build placeholder"

  # 嵌入式代码检查（语法检查）
  check-embedded:
    name: Check Embedded Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install C compiler
      uses: egor-tensin/setup-gcc@v1

    - name: Syntax check (placeholder)
      run: |
        # 注意：完整的 ESP32 构建需要 ESP-IDF 环境
        # 这里只做基本的语法检查
        echo "Embedded code syntax check placeholder"
        if [ -f "embedded_src/firmware/main.c" ]; then
          echo "✓ main.c exists"
        fi

  # 构建产物上传（可选）
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: [test-backend, lint]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create build artifact
      run: |
        mkdir -p build
        echo "Build completed at $(date)" > build/build-info.txt
        echo "Branch: ${{ github.ref_name }}" >> build/build-info.txt
        echo "Commit: ${{ github.sha }}" >> build/build-info.txt

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: build/

  # 部署（仅在 main 分支推送时执行）
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy placeholder
      run: |
        echo "Deployment placeholder"
        echo "Configure actual deployment steps here"